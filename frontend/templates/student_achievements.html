{% extends "base.html" %}

{% block title %}Student Achievements{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Student Achievements</h2>
    <div class="card mb-4">
        <div class="card-body text-center">
            <h4 class="mb-3">Hackathon X (Semi-finals) - Second Place</h4>
            <p class="text-muted mb-4">12.12.2024, Chennai &mdash; Cash Prize Rs. 50,000/-</p>
            <img src="{{ url_for('achievement_image') }}" 
                 alt="Hackathon – Second place" 
                 style="max-width: 100%; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);">
        </div>
    </div>
</div>
{% endblock %}
