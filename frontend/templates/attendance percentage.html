<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Percentage - Academic Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('students') }}">Students</a>
            <a href="{{ url_for('courses') }}">Courses</a>
            <a href="{{ url_for('time_table') }}">Time Table</a>
            <a href="{{ url_for('attendance_percentage') }}">Attendance</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
            <span class="theme-toggle-icon">🌙</span>
            <span>Toggle Theme</span>
        </button>
    </nav>
    <div class="container" style="max-width: 960px; margin: 2.5rem auto 0;">
        <h1 style="font-weight: 700; letter-spacing: 0.03em; margin-bottom: 1.5rem;">Attendance Percentage Calculator</h1>
        <div class="list-container" style="text-align: center; padding: 3rem 2.5rem; border-radius: 18px; box-shadow: 0 18px 45px rgba(15,23,42,0.16); background: radial-gradient(circle at 0% 0%, rgba(37,99,235,0.05), transparent 55%), radial-gradient(circle at 100% 100%, rgba(16,185,129,0.05), transparent 55%), #ffffff;">
            <p style="margin-bottom: 2rem; font-size: 1.05rem; color: #4b5563;">Click the button below to open the attendance percentage in a new tab.</p>
            <a href="https://script.google.com/macros/s/AKfycbwe38DsWLcGQ3KoAhmXdpmWbjxE2IhsEY35Srfflaeegr-m9bXZBQ0YelRH9gKRyi4w/exec" 
               class="btn-action" 
               style="background: linear-gradient(135deg, #2563eb 0%, #22c55e 100%); color: #ffffff; padding: 0.95rem 2.8rem; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; border-radius: 999px; font-size: 1.02rem; font-weight: 600; letter-spacing: 0.03em; box-shadow: 0 12px 30px rgba(37,99,235,0.4); text-transform: uppercase;"
               target="_blank">
                📊 <span>Check Attendance Percentage</span>
            </a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
