<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do List</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #3498db;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .task-list {
            margin-top: 20px;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            transition: transform 0.3s;
        }
        .task-item:hover {
            transform: scale(1.02);
        }
        .task-item .task-details {
            flex-grow: 1;
        }
        .task-item .task-actions button {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: flex-end; padding: 10px 20px;">
        <button type="button" class="btn" style="min-width: 140px; width: auto; padding: 0.55rem 1.5rem;" onclick="window.location.href='/dashboard'">
            DASHBOARD
        </button>
    </div>
    <div class="container">
        <h1>Advanced To-Do List</h1>
        <form id="todoForm">
            <div class="form-group">
                <label for="taskName">Task Name</label>
                <input type="text" id="taskName" placeholder="Enter task name" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" required>
                    <option value="Professional Coading Practice - II">Professional Coading Practice - II</option>
                    <option value="Professional Competency Development -III">Professional Competency Development -III</option>
                    <option value="Mathematics  III">Mathematics  III</option>
                    <option value="NOSQL Database with Mongo DB">NOSQL Database with Mongo DB</option>
                    <option value="Design and Analysis of Algorithm Laboratory">Design and Analysis of Algorithm Laboratory</option>
                    <option value="Hands on Python Laboratory">Hands on Python Laboratory</option>
                    <option value="Hands on C++ Laboratory">Hands on C++ Laboratory</option>
                    <option value="Computer Organization and Architecture">Computer Organization and Architecture</option>
                    <option value="Web Technology">Web Technology</option>
                    <option value="Web Technology Lab">Web Technology Lab</option>
                    <option value="Design and Analysis of Algorithm">Design and Analysis of Algorithm</option>
                </select>
            </div>
            <div class="form-group">
                <label for="deadline">Deadline</label>
                <input type="date" id="deadline" required>
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" required>
                    <option value="unfinished">Unfinished</option>
                    <option value="finished">Finished</option>
                </select>
            </div>
            <button type="submit" class="btn">Add Task</button>
        </form>

        <div class="task-list" id="taskList">
            <!-- Tasks will be dynamically added here -->
        </div>
    </div>

    <script>
        // Use a per-user storage key so tasks are isolated for each logged-in user
        const CURRENT_USER = "{{ username }}";
        const STORAGE_KEY = CURRENT_USER ? `advanced_todo_tasks_${CURRENT_USER}` : 'advanced_todo_tasks';
        const todoForm = document.getElementById('todoForm');
        const taskList = document.getElementById('taskList');

        // Helpers to work with localStorage
        function loadTasksFromStorage() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch (e) {
                console.error('Error reading tasks from localStorage', e);
                return [];
            }
        }

        function saveTasksToStorage(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function updateTaskInStorage(updatedTask) {
            const tasks = loadTasksFromStorage();
            const idx = tasks.findIndex(t => t.id === updatedTask.id);
            if (idx !== -1) {
                tasks[idx] = updatedTask;
                saveTasksToStorage(tasks);
            }
        }

        function deleteTaskFromStorage(taskId) {
            const tasks = loadTasksFromStorage().filter(t => t.id !== taskId);
            saveTasksToStorage(tasks);
        }

        // Create one task card in the DOM
        function addTaskToDOM(task) {
            const taskItem = document.createElement('div');
            taskItem.className = 'task-item';
            taskItem.dataset.id = task.id;

            const taskDetails = document.createElement('div');
            taskDetails.className = 'task-details';
            taskDetails.innerHTML = `<strong>${task.name}</strong><br>Subject: ${task.subject}<br>Deadline: ${task.deadline}<br>Status: ${task.status}`;

            const taskActions = document.createElement('div');
            taskActions.className = 'task-actions';

            const finishButton = document.createElement('button');
            finishButton.className = 'btn';
            finishButton.textContent = 'Mark as Finished';
            finishButton.onclick = function () {
                task.status = 'finished';
                taskDetails.innerHTML = `<strong>${task.name}</strong><br>Subject: ${task.subject}<br>Deadline: ${task.deadline}<br>Status: Finished`;
                updateTaskInStorage(task);
            };

            const deleteButton = document.createElement('button');
            deleteButton.className = 'btn btn-danger';
            deleteButton.textContent = 'Delete';
            deleteButton.onclick = function () {
                deleteTaskFromStorage(task.id);
                taskItem.remove();
            };

            taskActions.appendChild(finishButton);
            taskActions.appendChild(deleteButton);

            taskItem.appendChild(taskDetails);
            taskItem.appendChild(taskActions);

            taskList.appendChild(taskItem);
        }

        // Load all tasks on page load
        function renderAllTasks() {
            taskList.innerHTML = '';
            const tasks = loadTasksFromStorage();
            tasks.forEach(addTaskToDOM);
        }

        // Handle new task submission
        todoForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const name = document.getElementById('taskName').value;
            const subject = document.getElementById('subject').value;
            const deadline = document.getElementById('deadline').value;
            const status = document.getElementById('status').value;

            const newTask = {
                id: Date.now(),
                name,
                subject,
                deadline,
                status
            };

            const tasks = loadTasksFromStorage();
            tasks.push(newTask);
            saveTasksToStorage(tasks);

            addTaskToDOM(newTask);
            todoForm.reset();
        });

        document.addEventListener('DOMContentLoaded', renderAllTasks);
    </script>
</body>
</html>
