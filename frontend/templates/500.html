{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body text-center">
                    <h1 class="display-1 text-danger mb-4">500</h1>
                    <h2 class="mb-4">Internal Server Error</h2>
                    <p class="lead mb-4">Something went wrong on our end. Please try again later.</p>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Return to Dashboard</a>
                    {% if traceback %}
                    <div class="mt-4 text-start">
                        <h5>Debug traceback (development):</h5>
                        <pre style="max-height:300px;overflow:auto;background:#f8f9fa;padding:10px;border-radius:4px;">{{ traceback }}</pre>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
